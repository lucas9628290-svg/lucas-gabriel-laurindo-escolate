<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila Profissional</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  display: flex;
  overflow: hidden;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #050505, #000);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  animation: sumirIntro 4s ease forwards;
}

.logo {
  font-size: 60px;
  font-weight: bold;
  letter-spacing: 5px;
  color: #00c3ff;
  text-shadow:
    0 0 10px #00c3ff,
    0 0 20px #ff003c,
    0 0 40px #00c3ff,
    0 0 80px #ff003c;
  transform: perspective(500px) rotateX(15deg);
  animation: neonPulse 1.2s infinite alternate, zoomIn 2s ease;
}

@keyframes neonPulse {
  from { text-shadow: 0 0 5px #00c3ff, 0 0 10px #ff003c; }
  to { text-shadow: 0 0 20px #00c3ff, 0 0 60px #ff003c; }
}

@keyframes zoomIn {
  from { transform: scale(0.5) rotateX(30deg); opacity: 0; }
  to { transform: scale(1) rotateX(15deg); opacity: 1; }
}

@keyframes sumirIntro {
  0%,70% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

/* ===== RELÓGIO ===== */
#clock {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  color: red;
  font-weight: bold;
  letter-spacing: 3px;
  text-shadow: 0 0 10px red, 0 0 20px red, 0 0 40px red;
  cursor: pointer;
  z-index: 10000;
}

/* ===== PAINEL COR ===== */
#colorPanel {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 2px solid red;
  padding: 10px;
  border-radius: 10px;
  display: none;
  z-index: 10001;
}

#colorPanel input {
  padding: 8px;
  background: black;
  color: white;
  border: 1px solid #333;
}

#colorPanel button {
  padding: 8px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
}

/* ===== BORDA NEON ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  padding: 6px;
  background: linear-gradient(90deg, blue, red, blue, red);
  background-size: 300% 300%;
  animation: bordaAnimada 3s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);

  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
  z-index: 999999;
}

@keyframes bordaAnimada {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* ===== LIXEIRA ===== */
.lixeira {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 50px;
  height: 50px;
  background: #222;
  border: 2px solid red;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  z-index: 10000;
}

.lixeira.dragover {
  background: red;
  box-shadow: 0 0 20px red;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #111;
  height: 100vh;
  padding: 10px;
  overflow-y: auto;
}

.materia {
  background: #1a1a1a;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
  border-radius: 6px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #111;
  color: white;
  border: 1px solid #333;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
}

.nota {
  background: #1a1a1a;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  cursor: grab;
}

.flutuar {
  animation: flutuarGeral 6s ease-in-out infinite;
}

@keyframes flutuarGeral {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0px); }
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="logo">MOCHILA DIGITAL</div>
</div>

<!-- RELÓGIO -->
<div id="clock"></div>

<!-- PAINEL COR -->
<div id="colorPanel">
  <input id="colorInput" placeholder="Digite uma cor">
  <button onclick="aplicarCor()">OK</button>
</div>

<!-- LIXEIRA -->
<div class="lixeira" id="lixeira">🗑️</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>📚 Matérias</h3>
  <input id="novaMateria" placeholder="Nova matéria">
  <button onclick="addMateria()">Adicionar</button>
  <div id="listaMaterias"></div>
</div>

<!-- MAIN -->
<div class="main">
  <h2>Mochila Digital</h2>

  <div id="painel" style="display:none;">
    <h2 id="titulo"></h2>
    <textarea id="texto"></textarea>
    <button onclick="addNota()">Salvar</button>
    <div id="listaNotas"></div>
  </div>

  <h3 id="msg">Selecione uma matéria 👈</h3>
</div>

<script>

/* INTRO */
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
}, 3000);

/* RELÓGIO */
let clock = document.getElementById("clock");
let panel = document.getElementById("colorPanel");

function hora(){
  let d = new Date();
  clock.innerText =
    String(d.getHours()).padStart(2,"0") + ":" +
    String(d.getMinutes()).padStart(2,"0") + ":" +
    String(d.getSeconds()).padStart(2,"0");
}
setInterval(hora,1000);
hora();

/* COR */
clock.onclick = () => {
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

function aplicarCor(){
  let cor = document.getElementById("colorInput").value;
  if(!cor) return;

  clock.style.color = cor;
  clock.style.textShadow =
    `0 0 10px ${cor}, 0 0 20px ${cor}, 0 0 40px ${cor}`;

  localStorage.setItem("corClock", cor);
  panel.style.display = "none";
}

/* MOCHILA */
let dados = JSON.parse(localStorage.getItem("dados") || "{}");
let atual = null;

function salvar(){
  localStorage.setItem("dados", JSON.stringify(dados));
}

function addMateria(){
  let nome = document.getElementById("novaMateria").value.trim();
  if(!nome) return;
  if(!dados[nome]) dados[nome] = [];
  salvar();
  renderMaterias();
}

function renderMaterias(){
  let div = document.getElementById("listaMaterias");
  div.innerHTML = "";

  for(let m in dados){
    let el = document.createElement("div");
    el.className="materia flutuar";
    el.innerText=m;
    el.onclick=()=>abrir(m);
    div.appendChild(el);
  }
}

function abrir(nome){
  atual=nome;
  document.getElementById("painel").style.display="block";
  document.getElementById("msg").style.display="none";
  document.getElementById("titulo").innerText=nome;
  renderNotas();
}

function addNota(){
  let texto=document.getElementById("texto").value;
  if(!texto) return;

  dados[atual].push({texto, data:new Date().toLocaleString()});
  salvar();
  renderNotas();
}

/* NOTAS */
let dragIndex = null;

function renderNotas(){
  let div=document.getElementById("listaNotas");
  div.innerHTML="";

  dados[atual].forEach((n,i)=>{
    let el=document.createElement("div");
    el.className="nota flutuar";
    el.innerHTML=`<small>${n.data}</small><br>${n.texto}`;

    el.draggable = true;

    el.ondragstart = () => {
      dragIndex = i;
    };

    div.appendChild(el);
  });
}

/* LIXEIRA FUNCIONANDO */
let lixo = document.getElementById("lixeira");

lixo.ondragover = (e) => {
  e.preventDefault();
  lixo.classList.add("dragover");
};

lixo.ondragleave = () => {
  lixo.classList.remove("dragover");
};

lixo.ondrop = () => {
  lixo.classList.remove("dragover");

  if(dragIndex !== null){
    dados[atual].splice(dragIndex, 1);
    salvar();
    renderNotas();
    dragIndex = null;
  }
};

renderMaterias();

</script>

</body>
</html>
