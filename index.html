<script>

const SENHA_CORRETA = "23245190";

let fotos = [];
let indexAtual = 0;

/* LOGIN */
function entrar(){
  const senha=document.getElementById("senha").value;

  if(senha===SENHA_CORRETA){
    document.getElementById("login").style.display="none";
    document.getElementById("intro").style.display="flex";

    iniciarChuva();

    setTimeout(()=>{
      document.getElementById("intro").style.display="none";
      document.getElementById("app").style.display="block";
      carregarDados();
    }, 3000);

  } else {
    alert("Senha errada ❌");
  }
}

/* CHUVA */
function iniciarChuva(){
  const emojis=["📚","📖","📓","📒","📝","📕"];

  setInterval(()=>{
    const el=document.createElement("div");
    el.className="caderno";

    el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100 + "vw";
    el.style.fontSize = (20 + Math.random()*30) + "px";
    el.style.animationDuration = (2 + Math.random()*2) + "s";

    document.getElementById("chuva").appendChild(el);
    setTimeout(()=>el.remove(),5000);
  },200);
}

/* ABAS */
function trocar(id){
  document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

/* SALVAR */
function salvarDados(){
  localStorage.setItem("materias", document.getElementById("listaMaterias").innerHTML);
  localStorage.setItem("fotos", document.getElementById("galeria").innerHTML);
}

/* CARREGAR */
function carregarDados(){
  document.getElementById("listaMaterias").innerHTML = localStorage.getItem("materias") || "";
  document.getElementById("galeria").innerHTML = localStorage.getItem("fotos") || "";

  reativarBotoes();
}

/* REATIVAR EVENTOS */
function reativarBotoes(){

  document.querySelectorAll(".materiaBox button").forEach(btn=>{
    if(btn.innerText.includes("🗑️")){
      btn.onclick = function(){
        this.parentElement.remove();
        salvarDados();
      }
    }

    if(btn.innerText.includes("📱")){
      btn.onclick = function(){
        abrirMateria(this);
      }
    }
  });

  document.querySelectorAll("#galeria img").forEach((img,i)=>{
    fotos.push(img.src);
    img.onclick = ()=>abrirFoto(i);
  });
}

/* MATÉRIAS */
function addMateria(){
  const nome=document.getElementById('materiaNome');
  if(!nome.value) return;

  const div=document.createElement('div');
  div.className="materiaBox";

  div.innerHTML=`
    <h3 contenteditable="true">${nome.value}</h3>
    <p contenteditable="true">✏️ Escreva aqui...</p>
    <button>🗑️</button>
    <button>📱</button>
  `;

  document.getElementById('listaMaterias').appendChild(div);
  nome.value="";

  reativarBotoes();
  salvarDados();
}

/* TELA CHEIA */
function abrirMateria(btn){
  const box = btn.parentElement;

  const tela = document.createElement("div");
  tela.style.position="fixed";
  tela.style.top="0";
  tela.style.left="0";
  tela.style.width="100%";
  tela.style.height="100%";
  tela.style.background="#111";
  tela.style.color="white";
  tela.style.zIndex="999999";
  tela.style.padding="20px";

  tela.innerHTML = `
    <button onclick="this.parentElement.remove()">❌ Fechar</button>
    ${box.innerHTML}
  `;

  document.body.appendChild(tela);
}

/* FOTOS */
function addFoto(){
  const file=document.getElementById('fotoInput').files[0];
  if(!file) return;

  const r=new FileReader();

  r.onload=e=>{
    fotos.push(e.target.result);

    const img=document.createElement('img');
    img.src=e.target.result;
    img.style.width="100px";
    img.style.margin="5px";

    img.onclick=()=>abrirFoto(fotos.length-1);

    document.getElementById('galeria').appendChild(img);

    salvarDados();
  }

  r.readAsDataURL(file);
}

/* VISUALIZADOR */
function abrirFoto(i){
  indexAtual = i;

  const tela = document.createElement("div");
  tela.style.position="fixed";
  tela.style.top="0";
  tela.style.left="0";
  tela.style.width="100%";
  tela.style.height="100%";
  tela.style.background="rgba(0,0,0,0.9)";
  tela.style.display="flex";
  tela.style.flexDirection="column";
  tela.style.alignItems="center";
  tela.style.justifyContent="center";
  tela.style.zIndex="999999";

  tela.innerHTML=`
    <button onclick="this.parentElement.remove()">❌</button>
    <img id="imgView" src="${fotos[i]}" style="max-width:90%">
    <div>
      <button onclick="trocarFoto(-1)">⬅️</button>
      <button onclick="trocarFoto(1)">➡️</button>
    </div>
  `;

  document.body.appendChild(tela);
}

function trocarFoto(dir){
  indexAtual += dir;

  if(indexAtual < 0) indexAtual = fotos.length-1;
  if(indexAtual >= fotos.length) indexAtual = 0;

  document.getElementById("imgView").src = fotos[indexAtual];
}

</script>
