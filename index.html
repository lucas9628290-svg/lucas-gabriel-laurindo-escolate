<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila Profissional</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  display: flex;
  overflow: hidden;
}

/* BORDA DA TELA */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  padding: 6px;
  background: linear-gradient(90deg, blue, red, blue, red);
  background-size: 300% 300%;
  animation: bordaAnimada 4s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  z-index: 9999;
}

@keyframes bordaAnimada {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* LIXEIRA */
.lixeira {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 50px;
  height: 50px;
  background: #222;
  border: 2px solid red;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  z-index: 10000;
}

.lixeira.dragover {
  background: red;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #111;
  height: 100vh;
  padding: 10px;
  overflow-y: auto;
}

.materia {
  background: #1a1a1a;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
  border-radius: 6px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #111;
  color: white;
  border: 1px solid #333;
}

/* BOTÕES */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
  position: relative;
}

/* 🔵🔴 BORDA ANIMADA */
.materia::before,
.nota::before,
button::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 10px;
  background: linear-gradient(90deg, blue, red, blue, red);
  background-size: 300% 300%;
  z-index: -1;
  opacity: 0;
  transition: 0.3s;
  animation: bordaMov 2s linear infinite;
}

.materia:hover::before,
.nota:hover::before,
button:hover::before {
  opacity: 1;
}

@keyframes bordaMov {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* ✨ FLUTUAÇÃO SEGURA */
.flutuar {
  animation: flutuarGeral 6s ease-in-out infinite;
}

@keyframes flutuarGeral {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0px); }
}

/* TÍTULO */
.titulo-3d {
  font-size: 40px;
  text-align: center;
  color: #00b7ff;
}

/* NOTAS */
.nota {
  background: #1a1a1a;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
}

</style>
</head>

<body>

<div class="lixeira" id="lixeira">🗑️</div>

<div class="sidebar">
  <h3>📚 Matérias</h3>

  <input id="novaMateria" placeholder="Nova matéria">
  <button onclick="addMateria()">Adicionar</button>

  <div id="listaMaterias"></div>
</div>

<div class="main">

  <div class="titulo-3d">MOCHILA DIGITAL</div>

  <div id="painel" style="display:none;">
    <h2 id="titulo"></h2>

    <textarea id="texto" placeholder="Escreva a aula..."></textarea>
    <button onclick="addNota()">Salvar</button>

    <div id="listaNotas"></div>
  </div>

  <h3 id="msg">Selecione uma matéria 👈</h3>
</div>

<script>

let dados = JSON.parse(localStorage.getItem("dados") || "{}");
let atual = null;
let dragData = {};

function salvar() {
  localStorage.setItem("dados", JSON.stringify(dados));
}

function addMateria() {
  let nome = document.getElementById("novaMateria").value.trim();
  if (!nome) return;

  if (!dados[nome]) dados[nome] = [];

  salvar();
  renderMaterias();
  document.getElementById("novaMateria").value = "";
}

function renderMaterias() {
  let div = document.getElementById("listaMaterias");
  div.innerHTML = "";

  for (let m in dados) {

    let el = document.createElement("div");
    el.className = "materia flutuar";
    el.innerText = m;

    el.onclick = () => abrir(m);

    el.draggable = true;
    el.ondragstart = () => {
      dragData = { tipo: "materia", nome: m };
    };

    el.ondblclick = () => {
      let novo = prompt("Editar matéria:", m);
      if (novo && novo !== m) {
        dados[novo] = dados[m];
        delete dados[m];
        salvar();
        renderMaterias();
        if (atual === m) atual = novo;
      }
    };

    div.appendChild(el);
  }
}

function abrir(nome) {
  atual = nome;
  document.getElementById("msg").style.display = "none";
  document.getElementById("painel").style.display = "block";
  document.getElementById("titulo").innerText = nome;
  renderNotas();
}

function addNota() {
  let texto = document.getElementById("texto").value.trim();
  if (!texto) return;

  dados[atual].push({
    texto,
    data: new Date().toLocaleString()
  });

  salvar();
  document.getElementById("texto").value = "";
  renderNotas();
}

function renderNotas() {
  let div = document.getElementById("listaNotas");
  div.innerHTML = "";

  dados[atual].forEach((n, i) => {

    let el = document.createElement("div");
    el.className = "nota flutuar";

    el.innerHTML = `<small>${n.data}</small><br>${n.texto}`;

    el.draggable = true;
    el.ondragstart = () => {
      dragData = { tipo: "nota", index: i };
    };

    div.appendChild(el);
  });
}

/* LIXEIRA */
let lixo = document.getElementById("lixeira");

lixo.ondragover = (e) => {
  e.preventDefault();
  lixo.classList.add("dragover");
};

lixo.ondragleave = () => lixo.classList.remove("dragover");

lixo.ondrop = () => {
  lixo.classList.remove("dragover");

  if (dragData.tipo === "materia") {
    delete dados[dragData.nome];
    if (atual === dragData.nome) {
      document.getElementById("painel").style.display = "none";
      document.getElementById("msg").style.display = "block";
    }
  }

  if (dragData.tipo === "nota") {
    dados[atual].splice(dragData.index, 1);
  }

  salvar();
  renderMaterias();
  renderNotas();
};

renderMaterias();

</script>

</body>
</html>
